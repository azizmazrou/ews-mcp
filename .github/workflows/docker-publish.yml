name: Build and Publish Docker Image

# Publishes ews-mcp container images to GHCR so users can simply
#   docker pull ghcr.io/<owner>/<repo>:latest
# without cloning + building locally.
#
# Triggers:
#   * push to main      -> tags `latest` + branch + sha
#   * tag v*.*.*        -> tags semver (major / major.minor / full)
#   * pull_request      -> build only (no push); validates the Dockerfile
#   * workflow_dispatch -> manual rebuild

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=ews-mcp
            org.opencontainers.image.description=MCP server for Microsoft Exchange / Office 365
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build status
        run: |
          if [ "${{ steps.docker-build.outcome }}" == "success" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "::notice::Docker image built (PR — not pushed to GHCR)."
            else
              echo "::notice::Docker image built and pushed to GHCR. Pull with: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            fi
          else
            echo "::error::Docker build/push failed. If push failed for permissions, enable 'Read and write permissions' in Settings → Actions → General, or push manually with: docker login ghcr.io && docker build --push -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest ."
            exit 1
          fi
